<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="calculadorasimples.css">
</head>
<body>
    <div class="caixa">
        <label for="nome">Valor 1:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o valor 1:">

        <label for="nome">Valor 2:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o valor 2:">

        <label for="nome">Resultado:</label>
        <input type="text" id="nome" name="nome">

    </div>

    <div class="btnOperations">
        <button type="button">+</button>
        <button type="button">-</button>
        <button type="button">X</button>
        <button type="button">/</button>
    </div>
    <script src="calculadorasimples.js"></script>
</body>
</html>
